<div class="card w-full h-full flex flex-col bg-white rounded shadow" style="padding: 20px">
  <div class="flex justify-between items-center mb-4">
    <div class="font-semibold text-xl">{{ filterTitle() }}</div>
    <button mat-icon-button (click)="toggleFilter()">
      <mat-icon>{{ isShowFilter() ? 'keyboard_arrow_up' : 'keyboard_arrow_down' }}</mat-icon>
    </button>
  </div>

  @if (isShowFilter()) {
  <div class="flex flex-col gap-4 flex-1 overflow-y-auto w-full mb-4">
    <!-- Utilizing the Unified Form Component for Advanced Filtering -->
    <acty-form
      #filterForm
      [formConfigData]="searchList()"
      [isMaterialFilter]="true"
      [isCheckBoxAdded]="true"
      [labelId]="'filter'"
      [formId]="formID()"
      (formValuesChanged)="onFormValuesChanged($event)"
      (fieldInputFinished)="onFieldInputFinished($event)"
      (formReferenceSelected)="onReferenceSelected($event)">
    </acty-form>
  </div>
  }

  <div class="flex flex-wrap gap-2 mt-2">
    <div>
      <button mat-flat-button color="primary" (click)="getData()" [disabled]="isBackGroundOn()">
        <mat-icon>search</mat-icon> {{ textContent.SEARCH_BTN }}
      </button>
    </div>
    <div>
      <button mat-stroked-button color="primary" (click)="resetFilter()" [disabled]="isBackGroundOn()">
        <mat-icon>refresh</mat-icon> {{ textContent.RESET_BTN }}
      </button>
    </div>
    <div>
      @if (showDisplayConditionSetting() || showAutomaticAdjustment()) {
      <app-condition-settings
        [showDisplayConditionSetting]="showDisplayConditionSetting()"
        [showAutomaticAdjustment]="showAutomaticAdjustment()"
        [searchCols]="searchList()"
        [isBackGroundOn]="isBackGroundOn()"
        [formID]="formID()"
        (loadTriggered)="conditionSettingsLoad($event)"
        (conditionAdjustmentKBNOut)="conditionAdjustmentKBNChanged($event)"
        (getDataTrigger)="onGetDataTriggered($event)">
      </app-condition-settings>
      }
    </div>
  </div>
</div>
