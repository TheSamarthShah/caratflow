<div class="split-button acty-split-button" [class]="disabled()? 'disabled-btn ' : '' + severity() + '-btn'">
  <!-- Invisible trigger anchor -->
  <span
    class="menu-anchor"
    [matMenuTriggerFor]="menu"
    #menuTrigger="matMenuTrigger"
  >
  </span>

  <!-- First (main) button -->
  <div class="split-button-wrap">
    <acty-button
      [type]="type() === 'outlined' ? 'outlined' : 'filled'"
      [text]="text() | translate"
      [leftIcon]="leftIcon()"
      [disabled]="disabled()"
      [severity]="severity()"
      (clicked)="clicked.emit()"
      btnClass="main-button"
    />
  </div>

  <!-- Dropdown button -->
  <div class="split-button-dropdown-button acty-split-button-dropdown-button" [class.disabled]="disabled()" 
  [ngStyle]="{
      '--btn-color': severity() ? 'var(--theme-' + severity() + ')' : 'currentColor',
      '--shadow-spread': type() === 'filled' ? '3px' : '2px'}">
    <acty-button
      [type]="'icon'"
      [leftIcon]="'keyboard_arrow_down'"
      [disabled]="disabled()"
      [severity]="severity()"
      (clicked)="menuTrigger.openMenu()"
    />
  </div>

  <!-- Menu -->
  <mat-menu
    #menu="matMenu"
    class="split-button-menu-panel acty-split-button-menu"
  >
    @for(item of menuItems(); track $index){
    <button
      mat-menu-item
      (click)="menuClicked.emit(item)"
      class="split-button-menu-item acty-split-button-menu-item"
    >
      @if (item.icon) {
      <mat-icon class="acty-split-button-menu-item-icon">{{
        item.icon
      }}</mat-icon>
      }
      <span class="acty-split-button-menu-item-text">{{
        item.label | translate
      }}</span>
    </button>
    }
  </mat-menu>
</div>
